@Kopernicus:AFTER[SolSystem]
{
    @Body[Earth]
    {
        @PQS
        {
            @Mods
            {
                City2
                {
                    name = LaunchSiteTrackingStation
                    objectName = US - Minnesota Space Center
                    isKSC = True
                    lat = 45.4977
                    lon = -93.73
                    alt = 303.1008
                    enabled = True
                }
                @City2[*TrackingStation],*
                {
                    commnetStation = True
                    snapToSurface = True
                    snapHeightOffset = 0
                    up = 0.0, 1.0, 0.0
                    rotation = 0
                    order = 100
                }
                @City2[*TrackingStation],*
                {
                    LOD
                    {
                        Value
                        {
                            visibleRange = 30000
                            keepActive = False
                            model = BUILTIN/Dish
                            scale = 0.1, 0.1, 0.1
                            delete = False
                        }
                    }
                }
			}
		}
	}
}